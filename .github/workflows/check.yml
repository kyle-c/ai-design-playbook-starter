name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run test

      - name: Token contrast audit (WCAG AA)
        run: npm run tokens:audit

      - name: Copy audit (placeholders + char limits)
        run: npm run audit:copy

      - name: Hardcoded values audit (no hex / px in components)
        run: npm run audit:hardcoded

      - name: Token export drift check (iOS + Android)
        run: npm run tokens:check

      - name: Content inventory drift check
        run: npm run content:check

      - name: Decision-log changelog drift check
        run: npm run changelog:check

      - run: npm run build
